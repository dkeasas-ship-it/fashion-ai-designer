name: Update Dependencies

on:
  workflow_dispatch:

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Audit backend dependencies
        run: cd backend && npm audit --audit-level=moderate
        continue-on-error: false

      - name: Audit frontend dependencies
        run: cd frontend && npm audit --audit-level=moderate
        continue-on-error: false
      
      - name: Commit and push updated lockfiles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/package-lock.json frontend/package-lock.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update lockfiles with resolved dependencies and verified audits"
            git push
          fi
